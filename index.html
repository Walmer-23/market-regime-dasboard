<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Regime Dashboard v2</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0e1117; --surface: #1a1d26; --border: #2a2d38;
            --text-primary: #e8eaed; --text-secondary: #9aa0a6; --text-muted: #6b7280;
            --green: #16a34a; --green-bg: rgba(22, 163, 74, 0.15);
            --red: #dc2626; --red-bg: rgba(220, 38, 38, 0.15);
            --gray: #6b7280; --gray-bg: rgba(107, 114, 128, 0.12);
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text-primary); padding: 24px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; max-width: 1200px; margin: 0 auto 40px; }
        .tile { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; text-align: center; }
        .tile-label { font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 8px; }
        .tile-value { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
        .tile-detail { font-size: 12px; color: var(--text-muted); }
        .state-green { border-color: var(--green); background: var(--green-bg); color: var(--green); }
        .state-red { border-color: var(--red); background: var(--red-bg); color: var(--red); }
        .settings-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; max-width: 600px; margin: 0 auto; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 13px; margin-bottom: 6px; color: var(--text-secondary); }
        input, select { width: 100%; padding: 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: white; }
        .btn { background: #238636; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: 600; }
        .error { color: var(--red); font-size: 12px; margin-top: 10px; text-align: center; display: none; }
    </style>
</head>
<body>
    <div class="grid" id="dashboard"></div>
    <div id="error-msg" class="error"></div>
    <div class="settings-panel">
        <h3>Settings</h3>
        <div class="form-group">
            <label>Data Source</label>
            <select id="source" onchange="updateUI()">
                <option value="google">Google Sheets (Recommended)</option>
                <option value="twelve">Twelve Data API</option>
            </select>
        </div>
        <div class="form-group" id="google-grp">
            <label>Sheet ID or URL</label>
            <input type="text" id="sheet-id">
        </div>
        <div class="form-group" id="twelve-grp" style="display:none">
            <label>Twelve Data API Key (For SPY 20D SMA)</label>
            <input type="password" id="api-key">
        </div>
        <button class="btn" onclick="save()">Save & Connect</button>
    </div>
    <script>
        function updateUI() {
            const src = document.getElementById('source').value;
            document.getElementById('google-grp').style.display = src === 'google' ? 'block' : 'none';
            document.getElementById('twelve-grp').style.display = src === 'twelve' ? 'block' : 'none';
        }
        function save() {
            const data = { 
                source: document.getElementById('source').value, 
                sheet: document.getElementById('sheet-id').value, 
                key: document.getElementById('api-key').value 
            };
            localStorage.setItem('market_settings', JSON.stringify(data));
            location.reload();
        }

        async function fetchSpyData(key) {
            try {
                // Simplest possible fetch
                const pResp = await fetch(`https://api.twelvedata.com/price?symbol=SPY&apikey=${key}`);
                const pData = await pResp.json();
                if (pData.status === 'error') throw new Error(pData.message);

                const sResp = await fetch(`https://api.twelvedata.com/sma?symbol=SPY&interval=1day&time_period=20&apikey=${key}`);
                const sData = await sResp.json();
                if (sData.status === 'error') throw new Error(sData.message);

                const price = parseFloat(pData.price);
                const sma = parseFloat(sData.values[0].sma);

                return {
                    label: 'SPY 20D Trend',
                    value: price > sma ? 'SPY > 20D' : 'SPY < 20D',
                    detail: `Price: ${price.toFixed(2)} | 20D SMA: ${sma.toFixed(2)}`,
                    state: price > sma ? 'green' : 'red'
                };
            } catch (e) {
                return { label: 'SPY 20D Trend', value: 'API Error', detail: e.message, state: 'red' };
            }
        }

        window.onload = async () => {
            const s = JSON.parse(localStorage.getItem('market_settings')) || {};
            if(s.source) document.getElementById('source').value = s.source;
            if(s.sheet) document.getElementById('sheet-id').value = s.sheet;
            if(s.key) document.getElementById('api-key').value = s.key;
            updateUI();

            const tiles = [];
            tiles.push({label:'T2108 Zone', value:'Manual', detail:'Update in sheet', state:'gray'});

            if (s.key) {
                const spyTile = await fetchSpyData(s.key);
                tiles.push(spyTile);
            } else {
                tiles.push({label:'SPY 20D Trend', value:'No Key', detail:'Enter Key below', state:'gray'});
            }

            tiles.push({label:'VIX Regime', value:'Sheet Data', detail:'Wait for Sheet ID', state:'gray'});
            tiles.push({label:'Risk-ON Score', value:'Wait...', detail:'Calculating...', state:'gray'});

            document.getElementById('dashboard').innerHTML = tiles.map(t => `
                <div class="tile state-${t.state}">
                    <div class="tile-label">${t.label}</div>
                    <div class="tile-value">${t.value}</div>
                    <div class="tile-detail">${t.detail}</div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
