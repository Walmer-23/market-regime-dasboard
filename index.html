<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Regime Dashboard v2</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0e1117; --surface: #1a1d26; --border: #2a2d38;
            --text-primary: #e8eaed; --text-secondary: #9aa0a6; --text-muted: #6b7280;
            --green: #16a34a; --green-bg: rgba(22, 163, 74, 0.15);
            --red: #dc2626; --red-bg: rgba(220, 38, 38, 0.15);
            --yellow: #ca8a04; --yellow-bg: rgba(202, 138, 4, 0.15);
            --orange: #ea580c; --orange-bg: rgba(234, 88, 12, 0.15);
            --gray: #6b7280; --gray-bg: rgba(107, 114, 128, 0.12);
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text-primary); padding: 24px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; max-width: 1200px; margin: 0 auto 40px; }
        .tile { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; text-align: center; }
        .tile-label { font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 8px; }
        .tile-value { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
        .tile-detail { font-size: 12px; color: var(--text-muted); }
        .state-green { border-color: var(--green); background: var(--green-bg); color: var(--green); }
        .state-red { border-color: var(--red); background: var(--red-bg); color: var(--red); }
        .settings-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; max-width: 600px; margin: 0 auto; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 13px; margin-bottom: 6px; color: var(--text-secondary); }
        input, select { width: 100%; padding: 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: white; }
        .btn { background: #238636; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: 600; }
    </style>
</head>
<body>
    <div class="grid" id="dashboard"></div>
    <div class="settings-panel">
        <h3>Settings</h3>
        <div class="form-group">
            <label>Data Source</label>
            <select id="source" onchange="updateUI()"><option value="google">Google Sheets</option><option value="twelve">Twelve Data</option></select>
        </div>
        <div class="form-group" id="google-grp">
            <label>Sheet ID or URL</label>
            <input type="text" id="sheet-id">
        </div>
        <div class="form-group" id="twelve-grp" style="display:none">
            <label>Twelve Data API Key</label>
            <input type="password" id="api-key">
        </div>
        <button class="btn" onclick="save()">Save & Connect</button>
    </div>
    <script>
        function updateUI() {
            const src = document.getElementById('source').value;
            document.getElementById('google-grp').style.display = src === 'google' ? 'block' : 'none';
            document.getElementById('twelve-grp').style.display = src === 'twelve' ? 'block' : 'none';
        }
        function save() {
            const data = { source: document.getElementById('source').value, sheet: document.getElementById('sheet-id').value, key: document.getElementById('api-key').value };
            localStorage.setItem('market_settings', JSON.stringify(data));
            location.reload();
        }
        window.onload = () => {
            const s = JSON.parse(localStorage.getItem('market_settings')) || {};
            if(s.source) document.getElementById('source').value = s.source;
            if(s.sheet) document.getElementById('sheet-id').value = s.sheet;
            if(s.key) document.getElementById('api-key').value = s.key;
            updateUI();
            const tiles = [
                {label:'T2108 Zone', value:'Crash (<20)', detail:'T2108: 17', state:'red'},
                {label:'SPY 20D Trend', value:'SPY < 20D', detail:'SPY: 548.20 | 20D: 555.40', state:'red'},
                {label:'VIX Regime', value:'High (>=20)', detail:'VIX: 24.6', state:'red'},
                {label:'Risk-ON Score', value:'Score 2/4', detail:'Balanced', state:'red'}
            ];
            document.getElementById('dashboard').innerHTML = tiles.map(t => `<div class="tile state-${t.state}"><div class="tile-label">${t.label}</div><div class="tile-value">${t.value}</div><div class="tile-detail">${t.detail}</div></div>`).join('');
        }
    </script>
</body>
</html>
